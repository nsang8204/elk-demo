apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: fluentd

spec:
  selector:
    matchLabels:
      app: fluentd

  template:
    metadata:
      labels:
        app: fluentd

    spec:
      serviceAccountName: fluentd

      containers:
        - name: fluentd

          image: fluent/fluentd-kubernetes-daemonset:v1.18-debian-opensearch-1

          env:
            - name: FLUENT_UID
              value: "0"

          volumeMounts:
            - name: varlog
              mountPath: /var/log

            - name: config-volume
              mountPath: /fluentd/etc

            - name: varlibcontainers
              mountPath: /var/log/containers
              readOnly: true

            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true

      volumes:
        - name: varlog
          hostPath:
            path: /var/log

        - name: config-volume
          configMap:
            name: fluentd-config
        
        - name: varlibcontainers
          hostPath:
            path: /var/log/containers

        - name: varlogpods
          hostPath:
            path: /var/log/pods