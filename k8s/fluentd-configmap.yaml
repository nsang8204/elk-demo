apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config

data:
  fluent.conf: |
    <source>
      @type tail

      path /var/log/containers/*.log

      pos_file /fluentd/log/fluentd.pos

      tag kubernetes.*

      read_from_head true

      <parse>
        @type none
      </parse>
    </source>

    <filter kubernetes.**>
      @type kubernetes_metadata
    </filter>

    <match kubernetes.**>
      @type opensearch

      host opensearch

      port 9200

      scheme http

      logstash_format true

      logstash_prefix k8s

      include_tag_key true

      tag_key fluent_tag

      <buffer>
        @type file

        path /fluentd/buffer

        flush_interval 5s

        retry_forever true
      </buffer>
    </match>