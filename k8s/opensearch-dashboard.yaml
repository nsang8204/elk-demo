apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboards

spec:
  replicas: 1

  selector:
    matchLabels:
      app: dashboards

  template:
    metadata:
      labels:
        app: dashboards

    spec:
      containers:
        - name: dashboards

          image: opensearchproject/opensearch-dashboards:2.19.0

          ports:
            - containerPort: 5601

          volumeMounts:
            - name: dashboards-config
              mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml

      volumes:
        - name: dashboards-config
          configMap:
            name: dashboards-config

---
apiVersion: v1
kind: Service
metadata:
  name: dashboards

spec:
  selector:
    app: dashboards

  ports:
    - port: 5601
      targetPort: 5601

  type: ClusterIP