apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboards

spec:
  replicas: 1

  selector:
    matchLabels:
      app: dashboards

  template:
    metadata:
      labels:
        app: dashboards

    spec:
      containers:
        - name: dashboards

          image: opensearchproject/opensearch-dashboards:2.19.0

          ports:
            - containerPort: 5601

          env:
            - name: OPENSEARCH_HOSTS
              value: '["https://opensearch:9200"]'

            - name: OPENSEARCH_USERNAME
              value: admin

            - name: OPENSEARCH_PASSWORD
              value: "GuEsT456@@789"

            - name: OPENSEARCH_SSL_VERIFICATIONMODE
              value: none

---
apiVersion: v1
kind: Service
metadata:
  name: dashboards

spec:
  selector:
    app: dashboards

  ports:
    - port: 5601
      targetPort: 5601

  type: ClusterIP